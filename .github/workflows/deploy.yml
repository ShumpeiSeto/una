name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # mainブランチにpushしたら起動

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # リポジトリをチェックアウト
      - name: Checkout
        uses: actions/checkout@v4

      # Node.jsをセットアップ
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 依存関係をインストール（sassが入る）
      - name: Install dependencies
        run: npm install

      # SCSSをコンパイル
      - name: Build CSS
        run: npm run build:css

      # GitHub Pagesにデプロイ
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./  # ルートごとデプロイ
